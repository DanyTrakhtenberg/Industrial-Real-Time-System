syntax = "proto3";

package industrial.common.v1;

option csharp_namespace = "Industrial.Common.V1";

// Shared primitives for cross-service contracts. Extend as needed during implementation.

message CorrelationContext {
  string correlation_id = 1;
}

message PageRequest {
  int32 page_size = 1;
  string page_token = 2;
}

message PageResponse {
  string next_page_token = 1;
}
