syntax = "proto3";

package industrial.inventory.v1;

option csharp_namespace = "Industrial.Inventory.V1";

import "google/protobuf/timestamp.proto";
import "common/v1/types.proto";

// Durable configuration and reference data owned by the SQL Data service.

message SensorDescriptor {
  int32 sensor_id = 1;
  string display_name = 2;
  bool enabled = 3;
}

message ListSensorsRequest {
  industrial.common.v1.CorrelationContext correlation = 1;
  industrial.common.v1.PageRequest page = 2;
}

message ListSensorsResponse {
  repeated SensorDescriptor sensors = 1;
  industrial.common.v1.PageResponse page = 2;
}

message GetSensorRequest {
  industrial.common.v1.CorrelationContext correlation = 1;
  int32 sensor_id = 2;
}

message UpsertSensorRequest {
  industrial.common.v1.CorrelationContext correlation = 1;
  SensorDescriptor sensor = 2;
}

message MutationResponse {
  bool ok = 1;
  google.protobuf.Timestamp updated_at = 2;
}

service SensorConfiguration {
  rpc ListSensors(ListSensorsRequest) returns (ListSensorsResponse);
  rpc GetSensor(GetSensorRequest) returns (SensorDescriptor);
  rpc UpsertSensor(UpsertSensorRequest) returns (MutationResponse);
}
